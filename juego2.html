<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partes del Arma 2</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    color: white;
    font-size: 20px;
    background-color: #000000;
    margin: 0;
  }

  h2 {
    margin: 10px;
  }

  .game-area {
    position: relative;
    width: 90%;
    max-width: 800px;
    margin: auto;
  }

  .game-area img {
    width: 100%;
    display: block;
  }

  .dropzone {
    position: absolute;
    width: 11%;
    height: 5%;
    border: 2px solid rgb(0, 0, 0);
    background: rgba(163, 163, 163, 0.3);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.5s ease;

    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  /* 🔥 TEXTO DENTRO DEL CUADRO */
  .dropzone .draggable {
    font-size: 10px;
    padding: 0;
    margin: 0;
    background: none !important;
  }

  /* POSICIONES EN % (convertidas desde px) */
  #zona1 { top: 16.2%; left: 31%; }
  #zona2 { top: 14.4%; left: 44%; }
  #zona3 { top: 45.8%; left: 66.8%; }
  #zona4 { top: 61.1%; left: 47%; }
  #zona5 { top: 83%; left: 29%; }
  #zona6 { top: 48.6%; left: 7%; }

  .correct {
    background: rgba(30, 255, 0, 0.699);
  }

  .incorrect {
    background: rgba(255, 0, 0, 0.699);
  }

  .items {
    margin-top: 20px;
  }

  .draggable {
    display: inline-block;
    padding: 20px;
    margin: 30px;
    font-size: 14px;
    background: rgb(255, 255, 255);
    color: black;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.5s ease;
  }

  /* 📱 MOBILE */
  @media (max-width: 600px) {
    h2 {
      font-size: 18px;
    }

    .draggable {
      padding: 12px;
      margin: 15px;
      font-size: 13px;
    }

    .dropzone {
      font-size: 9px;
    }
  }
</style>

</head>
<body>

<h2>Partes de la Bersa TPR9</h2>

<div class="game-area">
  <img src="./arma_plantilla2.png">

  <div class="dropzone" id="zona1" data-match="p1"></div>
  <div class="dropzone" id="zona2" data-match="p2"></div>
  <div class="dropzone" id="zona3" data-match="p3"></div>
  <div class="dropzone" id="zona4" data-match="p4"></div>
  <div class="dropzone" id="zona5" data-match="p5"></div>
  <div class="dropzone" id="zona6" data-match="p6"></div>
</div>

<div class="items"></div>

<script>
const dropzones = document.querySelectorAll('.dropzone');
const containerItems = document.querySelector('.items');

let seleccionActual = null;

let opciones = [
  { id: "p1", texto: "Uña estractora" },
  { id: "p2", texto: "Indicador cartucho" },
  { id: "p3", texto: "Cañon ventana de expulsion" },
  { id: "p4", texto: "Arco guardamonte" },
  { id: "p5", texto: "Cargador" },
  { id: "p6", texto: "Cola de castor" },
];

function mezclar(array) {
  return array.sort(() => Math.random() - 0.5);
}

let opcionesRestantes = mezclar([...opciones]);

function mostrarSiguiente() {
  containerItems.innerHTML = "";

  if (opcionesRestantes.length === 0) {
    containerItems.innerHTML = "<b>🎉 Aprobaste:) 🎉</b>";
    return;
  }

  const opcion = opcionesRestantes[0];

  const div = document.createElement("div");
  div.classList.add("draggable");
  div.id = opcion.id;
  div.textContent = opcion.texto;

  div.addEventListener('click', () => {
    seleccionActual = div;
    div.style.background = "lightgrey";
  });

  containerItems.appendChild(div);
}

function reiniciarJuego() {
  dropzones.forEach(zone => {
    zone.innerHTML = "";
    zone.classList.remove('correct', 'incorrect');
  });

  opcionesRestantes = mezclar([...opciones]);
  seleccionActual = null;

  mostrarSiguiente();
}

dropzones.forEach(zone => {
  zone.addEventListener('click', () => {
    if (!seleccionActual) return;

    if (zone.dataset.match === seleccionActual.id) {
      zone.classList.add('correct');
      zone.appendChild(seleccionActual);

      opcionesRestantes.shift();
      seleccionActual = null;

      setTimeout(() => {
        mostrarSiguiente();
      }, 500);

    } else {
      zone.classList.add('incorrect');
      zone.appendChild(seleccionActual);

      seleccionActual = null;

      setTimeout(() => {
        reiniciarJuego();
      }, 1500);
    }
  });
});

mostrarSiguiente();
</script>

</body>
</html>
